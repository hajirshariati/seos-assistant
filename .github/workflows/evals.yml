name: evals

# Gate eval regressions before deploy (audit #8). Runs the full offline eval
# suite (scripts/run-evals.mjs) on every push and PR. Env-gated and known-failing
# suites are excluded by the runner; everything else must stay green.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The eval modules import server code that transitively imports the Prisma
      # client, so it must be generated first. (No DB connection needed for
      # `generate`; the offline evals never touch the database.)
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run offline eval suite
        run: npm run eval:ci
